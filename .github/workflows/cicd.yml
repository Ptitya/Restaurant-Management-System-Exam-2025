name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run backend tests
        working-directory: ./backend
        run: npm run test
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      # --- 🚀 ส่วนของ NEWMAN อยู่ตรงนี้ครับ ---
      - name: Start Server and Run Newman
        working-directory: ./backend
        run: |
          npm run dev > server.log 2>&1 &
          npx wait-on tcp:3001 --timeout 60000
          npx newman run tests/postman/RMS-TestSuite-v2.json \
            -e tests/postman/env-local.json \
            --reporters cli
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"
          JWT_SECRET: "rms-dev-secret-key-change-in-production"
          PORT: 3001

      # ส่วนของ Frontend รันต่อท้าย
      - name: Setup Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend build
        working-directory: ./frontend
        run: npm run build