name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run Database Push
        working-directory: ./backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      - name: Run Unit Tests (Vitest)
        working-directory: ./backend
        run: npm run test
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      - name: Start Server and Run Newman
        working-directory: ./backend
        run: |
          # 1. รัน Server ไว้ที่ background
          npm run dev & 
          
          # 2. รอจนกว่า Server จะพร้อม (ตรวจสอบจาก endpoint login หรือ health)
          npx wait-on http://localhost:3001/api/auth/login --timeout 60000
          
          # 3. รัน Newman (ตรวจสอบ path ไฟล์ json ให้ถูกต้อง)
          npx newman run tests/postman/RMS-TestSuite-v2.json \
            -e tests/postman/env-local.json \
            --reporters cli
        env:
          DATABASE_URL: "postgresql://neondb_owner:npg_pYKF58nvkMSm@ep-nameless-breeze-aos2r6sq-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require"
          JWT_SECRET: "rms-dev-secret-key-change-in-production"