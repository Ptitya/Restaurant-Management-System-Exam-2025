name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      # --- BACKEND SECTION ---
      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run Database Push
        working-directory: ./backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      - name: Run Unit Tests (Vitest)
        working-directory: ./backend
        run: npm run test
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      - name: Start Server and Run Newman
        working-directory: ./backend
        run: |
          # รัน Backend ในพื้นหลัง
          npm run dev > server.log 2>&1 & 
          
          # รอให้ Port 3001 พร้อมใช้งาน
          npx wait-on tcp:3001 --timeout 60000
          
          # รัน Newman (เช็ค Path ไฟล์ .json ให้ตรงกับใน GitHub ของเนมนะ)
          npx newman run tests/postman/RMS-TestSuite-v2.json \
            -e tests/postman/env-local.json \
            --reporters cli
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"
          JWT_SECRET: "rms-dev-secret-key-change-in-production"
          PORT: 3001

      # --- FRONTEND SECTION ---
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend build
        working-directory: ./frontend
        run: npm run build

      # --- DEBUG SECTION ---
      - name: Debug Server Log on Failure
        if: failure()
        run: cat backend/server.log