name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      # ✅ Step: ตรวจสอบความปลอดภัยของ Dependencies
      - name: Security Audit
        working-directory: ./backend
        run: npm audit --audit-level=high || true # ใส่ true เพื่อไม่ให้ pipeline หยุดถ้าเจอช่องโหว่ที่ไม่ร้ายแรง

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate

      # ✅ Step: เตรียม Database Schema และ Seed ข้อมูลเริ่มต้น
      - name: Setup Database
        working-directory: ./backend
        run: npx prisma db push --force-reset && npx prisma db seed
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      - name: Run backend tests
        working-directory: ./backend
        run: npm run test
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      # --- 🚀 ส่วนของ NEWMAN (E2E API Testing) ---
      - name: Start Server and Run Newman
        working-directory: ./backend
        run: |
          # 1. ติดตั้ง wait-on เพื่อรอ server พร้อม
          npm install wait-on
          
          # 2. รัน Server ใน Background
          npm run dev > server.log 2>&1 & 
          
          # 3. รอจนกว่า Port 3001 จะพร้อมใช้งาน (timeout 60s)
          npx wait-on tcp:3001 --timeout 60000
          
          # 4. รัน Newman (ตรวจสอบ path ให้ตรงกับโครงสร้าง folder เนมนะคั้บ)
          npx newman run tests/postman/RMS-TestSuite-v2.json \
            --reporters cli
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"
          JWT_SECRET: "rms-dev-secret-key-change-in-production"
          PORT: 3001

      # ส่วนของ Frontend
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run frontend build
        working-directory: ./frontend
        run: npm run build