name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # สร้าง Database จำลองภายใน Runner (เสถียรที่สุดสำหรับ CI)
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rms_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Run Database Push
        working-directory: ./backend
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      - name: Run Unit Tests (Vitest)
        working-directory: ./backend
        run: npm run test
        env:
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"

      - name: Start Server and Run Newman
        working-directory: ./backend
        run: |
          # 1. รัน Server ไว้ที่ background และเก็บ Log ลงไฟล์เพื่อใช้ Debug
          npm run dev > server.log 2>&1 & 
          
          # 2. รอจนกว่า Port 3001 จะเปิด (ใช้ tcp จะชัวร์กว่า http ใน CI)
          npx wait-on tcp:3001 --timeout 60000
          
          # 3. รัน Newman (ตรวจสอบ Path ของไฟล์ให้ตรงกับใน Repo)
          npx newman run tests/postman/RMS-TestSuite-v2.json \
            -e tests/postman/env-local.json \
            --reporters cli
        env:
          # ✅ สำคัญ: ต้องใช้ localhost เหมือนกันทุกขั้นตอนเพื่อให้คุยกับ Service ด้านบนได้
          DATABASE_URL: "postgresql://postgres:password@localhost:5432/rms_db"
          JWT_SECRET: "rms-dev-secret-key-change-in-production"
          PORT: 3001

      # ขั้นตอนพิเศษ: ถ้าพัง ให้เอา Log ของ Server ออกมาโชว์ว่าติดตรงไหน
      - name: Debug Server Log on Failure
        if: failure()
        run: cat backend/server.log